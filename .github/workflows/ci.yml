name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check installed dependencies
        run: python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q app main.py

      - name: Run tests
        run: pytest -q

      - name: Run AI Scientific Agent demo smoke test
        run: >
          python app/ai_scientific_demo.py
          --topic "LVLM hallucination mitigation"
          --papers-dir tests/fixtures/papers
          --top-k 5
          --offline

      - name: Run top-level CLI smoke test
        run: >
          python main.py
          --topic "LVLM hallucination mitigation"
          --papers-dir tests/fixtures/papers
          --top-k 5
          --offline
